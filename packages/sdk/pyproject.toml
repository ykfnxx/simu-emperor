[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "simu-sdk"
version = "0.1.0"
description = "Agent SDK for simu-emperor"
requires-python = ">=3.12"
dependencies = [
    "simu-shared",
    "httpx>=0.27",
    "httpx-sse>=0.4",
    "aiosqlite>=0.20",
    "aiofiles>=24.1",
    "any-llm-sdk>=1.0",
    "watchfiles>=1.0",
    "pyyaml>=6.0",
    "chromadb>=0.5.0",
    "bub>=0.3.6",
    "mcp>=1.0",
]

[tool.hatch.build.targets.wheel]
packages = ["simu_sdk"]
