[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "simu-shared"
version = "0.1.0"
description = "Shared data models for simu-emperor"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0",
]

[tool.hatch.build.targets.wheel]
packages = ["simu_shared"]
