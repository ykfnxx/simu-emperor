[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "simu-server"
version = "0.1.0"
description = "Server platform for simu-emperor"
requires-python = ">=3.12"
dependencies = [
    "simu-shared",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "aiosqlite>=0.20",
    "sse-starlette>=2.0",
    "pydantic-settings>=2.0",
    "python-dotenv>=1.0",
    "pyyaml>=6.0",
    "anthropic>=0.40",
    "openai>=1.50",
    "mcp>=1.0",
]

[project.scripts]
simu-server = "simu_server.main:main"

[tool.hatch.build.targets.wheel]
packages = ["simu_server"]
