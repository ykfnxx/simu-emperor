# Benchmark Test Environment Configuration
# Isolated environment for running benchmarks without affecting production data

llm:
  provider: "anthropic"
  model: "claude-3-5-sonnet-20241022"
  api_key: ""  # Set via BENCHMARK_LLM_API_KEY env var
  base_url: null
  timeout: 120
  max_retries: 3

# Isolated test environment
test:
  database: "test_benchmark.db"
  data_dir: "data/benchmark_test/"
  auto_cleanup: true  # Clean up test data after each run

# Benchmark API configuration  
api:
  host: "127.0.0.1"
  port: 8765  # Different from main server (8000)
  timeout_seconds: 300
