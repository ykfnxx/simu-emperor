<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>皇帝模拟器</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <h1>皇帝模拟器</h1>
        <div id="status-bar">
            <span id="turn-display">回合: -</span>
            <span id="phase-display">阶段: -</span>
            <span id="treasury-display">国库: -</span>
        </div>
    </header>

    <main>
        <section id="control-panel">
            <button id="advance-btn" onclick="advanceTurn()">推进阶段</button>
        </section>

        <div id="content-grid">
            <section id="provinces-panel">
                <h2>省份概览</h2>
                <div id="provinces-list"></div>
            </section>

            <section id="reports-panel">
                <h2>Agent 报告</h2>
                <div id="reports-list"></div>
            </section>

            <section id="chat-panel">
                <h2>对话</h2>
                <select id="agent-select"></select>
                <div id="chat-messages"></div>
                <div id="chat-input-row">
                    <input type="text" id="chat-input" placeholder="输入消息..."
                           onkeydown="if(event.key==='Enter')sendChat()">
                    <button onclick="sendChat()">发送</button>
                </div>
            </section>

            <section id="command-panel">
                <h2>下达命令</h2>
                <form id="command-form" onsubmit="submitCommand(event)">
                    <input type="text" name="command_type" placeholder="命令类型" required>
                    <input type="text" name="description" placeholder="命令描述" required>
                    <input type="text" name="target_province_id" placeholder="目标省份ID（可选）">
                    <label><input type="checkbox" name="direct"> 皇帝亲政</label>
                    <button type="submit">提交</button>
                </form>
                <div id="commands-list"></div>
            </section>
        </div>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
