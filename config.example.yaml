# 皇帝模拟器 V4.3 配置示例

# LLM 配置（V4.3 两层配置）
llm:
  provider: "anthropic"              # 可选: mock, anthropic, openai
  api_key: null                      # API Key
  api_base: null                     # API Base URL
  context_window: 128000             # 上下文窗口大小

  # 默认配置
  default:
    model: "claude-sonnet-4-20250514"
    temperature: 0.7
    max_tokens: 2000

  # 任务特定配置（可选）
  task_configs:
    memory_summarize:
      model: "claude-haiku-3-5-20250514"
      temperature: 0.5
      max_tokens: 500
    title_generation:
      model: "claude-haiku-3-5-20250514"
      temperature: 0.3
      max_tokens: 100
    query_parsing:
      model: "claude-haiku-3-5-20250514"
      temperature: 0.3
      max_tokens: 500

# Embedding 配置（V4.2）
embedding:
  provider: "openai"                # 可选: openai, mock
  api_key: null                     # OpenAI API Key
  api_base: null                    # 兼容 OpenAI 格式的服务（如 DeepSeek、智谱）
  model: "text-embedding-3-small"
  enabled: true                     # 是否启用向量检索
  batch_size: 100                   # 批量 embedding 大小
  dimensions: 1536                  # 向量维度
  timeout: 30                       # API 超时（秒）
  max_retries: 3                    # 失败重试次数
  retry_delay: 1.0                  # 重试延迟（秒），指数退避

# ChromaDB 向量数据库配置（V4.2）
chromadb:
  enabled: true                     # 是否启用 ChromaDB
  persist_directory: "data/chroma"  # 持久化目录
  collection_name: "memory_segments"
  distance_metric: "cosine"         # 可选: cosine, l2, ip

# 调试配置（V4.2）
debug:
  enable_jsonl: true                # 同时写入 tape.jsonl（调试用）

# Agent 事件队列配置（V4.2）
agent_queue:
  enabled: true                     # 是否启用消息队列（背压处理）
  max_size: 0                       # 队列最大容量（0 = 无界）

# V3 记忆系统配置
memory:
  enabled: true
  context:
    max_tokens: null                # 留空则自动从 LLM API 获取
    threshold_ratio: 0.95
    keep_recent_events: 20
  retrieval:
    default_max_results: 5
    cross_session_enabled: true
    entity_match_weights:
      action: 0.4
      target: 0.3
      time: 0.2
  memory_dir: "data/memory"

# 日志配置
logging:
  log_level: "INFO"
  log_json_format: false
  llm_audit_enabled: false
  llm_audit_dir: "data/audit/llm"

# 随机事件配置
incident:
  enabled: true
  check_interval_ticks: 4
  base_trigger_probability: 0.1
  max_active_system_incidents: 5
  llm_beautify_enabled: true

# Agent 自主记忆配置
autonomous_memory:
  enabled: true
  check_interval_ticks: 4
  soul_evolution_enabled: true
