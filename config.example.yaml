# 皇帝模拟器 V3 配置示例

# LLM 配置
llm:
  provider: "mock"  # 可选: mock, anthropic, openai
  api_key: null
  api_base: null
  model: null

# V3 记忆系统配置
memory:
  # 记忆系统开关（默认启用）
  enabled: true

  # 上下文窗口配置
  context:
    # max_tokens: 留空则自动从 LLM API 获取模型的上下文窗口大小
    # 也可以手动指定，如：8000, 128000, 200000 等
    max_tokens: null
    threshold_ratio: 0.95         # 触发总结的比例阈值（95%）
    keep_recent_events: 20        # 滑动窗口后保留的最近事件数

  # 检索配置
  retrieval:
    default_max_results: 5        # 默认返回的最大结果数
    cross_session_enabled: true   # 是否启用跨会话检索
    entity_match_weights:         # 实体匹配权重
      action: 0.4                 # 动作匹配权重
      target: 0.3                 # 目标匹配权重
      time: 0.2                   # 时间匹配权重

  # 存储路径
  memory_dir: "data/memory"       # 记忆存储根目录

# 日志配置
logging:
  log_level: "INFO"
  log_json_format: false
  llm_audit_enabled: false
  llm_audit_dir: "data/audit/llm"

# 随机事件配置
incident:
  enabled: true                       # 是否启用随机事件生成
  check_interval_ticks: 4             # 每隔多少 tick 检查一次（4 = 每月）
  base_trigger_probability: 0.1       # 基础触发概率
  max_active_system_incidents: 5      # 系统生成的最大活跃事件数
  llm_beautify_enabled: true          # 是否启用 LLM 叙事美化

# Agent 自主记忆配置
autonomous_memory:
  enabled: true                       # 是否启用自主记忆反思
  check_interval_ticks: 4             # 每隔多少 tick 反思一次（4 = 每月）
  soul_evolution_enabled: true        # 是否允许 soul.md 性格演化
